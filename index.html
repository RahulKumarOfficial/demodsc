<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Floating Translate Fix</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .content { max-width: 600px; margin: auto; border: 1px solid #ccc; padding: 20px; }
    </style>
</head>
<body>

    <div class="content">
        <h1>Testing Floating Widget</h1>
        <p>Agar sab sahi raha, toh screen ke niche-daayein (bottom-right) kone mein ek "Select Language" ka button dikhega.</p>
        <p>Internet on rakhiyega!</p>
    </div>

    <script>
        window.gtranslateSettings = {
            "default_language": "en",
            "languages": ["en", "hi", "bn"],
            "wrapper_selector": ".gtranslate_wrapper", // Isko khali div ke liye rehne dein
            "flag_size": 24,
            "horizontal_position": "right",
            "vertical_position": "bottom",
            "alt_flags": {"en": "usa"}
        }
    </script>

    <script src="https://cdn.gtranslate.net/widgets/latest/float.js" defer></script>
    
    <div class="gtranslate_wrapper"></div>

</body>
</html>
